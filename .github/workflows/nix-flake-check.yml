---
name: "Nix Flake Check"
run-name: "nfc"
on:
  workflow_dispatch:
  push:

jobs:
  nfc:
    runs-on: "ubuntu-latest"
    steps:
    - name: "Install Nix"
      uses: cachix/install-nix-action@v31
      with:
        nix_path: nixpkgs=channel:nixos-unstable
    - name: "Check flake"
      uses: "DeterminateSystems/flake-checker-action@v12"
      with:
        fail-mode: true
